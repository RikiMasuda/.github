name: Feature request
description: 機能要望 / 改善提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **背景**と**提案**を簡潔に記入してください。完成イメージがあれば、より実装しやすくなります。

  - type: textarea
    id: problem
    attributes:
      label: 背景 / 課題
      description: What/Why：何が必要か、なぜ必要か
      placeholder: |
        例：機械学習モデルの比較が手動なので、自動で複数モデルの精度を比較できるようにしたい
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: How/What：どうしたいか、実装内容
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完成イメージ（任意）
      description: この機能ができたら「完成」と判断するポイント
      placeholder: |
        - [ ] 複数のモデルの精度が表で比較できる
        - [ ] CSV エクスポート機能がある
    validations:
      required: false

  - type: checkboxes
    id: verification
    attributes:
      label: 確認項目
      options:
        - label: 動作確認が完了している
        - label: ドキュメント・コメントが追加されている
